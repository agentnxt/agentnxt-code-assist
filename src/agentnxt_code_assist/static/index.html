<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentNXT Code Assist</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-panel">
        <div class="brand-block">
          <div class="brand-mark">AX</div>
          <div>
            <h1>AgentNXT Code Assist</h1>
            <p>Aider-powered repository chat</p>
          </div>
        </div>

        <form id="settings-form" class="settings-form">
          <section class="control-section">
            <h2>Model</h2>
            <label>
              Provider
              <select id="provider">
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="openai-compatible">OpenAI Compatible</option>
                <option value="custom">Custom</option>
              </select>
            </label>
            <label>
              Model
              <input id="model" type="text" autocomplete="off" placeholder="gpt-4o" />
            </label>
            <label>
              API base URL
              <input id="api-base" type="url" autocomplete="off" placeholder="https://llm.openautonomyx.com/v1" />
            </label>
            <label>
              API key
              <input id="api-key" type="password" autocomplete="off" placeholder="Uses server env when blank" />
            </label>
          </section>

          <section class="control-section">
            <h2>Environment</h2>
            <label>
              Variables
              <textarea id="env-vars" rows="5" spellcheck="false" placeholder="OPENAI_API_VERSION=2024-10-21&#10;LITELLM_USER=agentnxt"></textarea>
            </label>
            <div id="server-env" class="env-status" aria-live="polite"></div>
          </section>

          <section class="control-section">
            <h2>Repository</h2>
            <label>
              Repo path
              <input id="repo-path" type="text" autocomplete="off" placeholder="/path/to/repo" required />
            </label>
            <label>
              Files
              <textarea id="files" rows="5" placeholder="src/app.py&#10;tests/test_app.py"></textarea>
            </label>
          </section>

          <section class="control-section">
            <h2>Run Options</h2>
            <label class="check-row">
              <input id="auto-yes" type="checkbox" />
              <span>Auto-confirm Aider prompts</span>
            </label>
            <label class="check-row">
              <input id="dry-run" type="checkbox" />
              <span>Dry run</span>
            </label>
            <label class="check-row">
              <input id="auto-commits" type="checkbox" />
              <span>Allow auto-commits</span>
            </label>
          </section>
        </form>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <h2>Code Chat</h2>
            <p id="status-text">Ready</p>
          </div>
          <button id="clear-chat" class="icon-button" type="button" aria-label="Clear chat" title="Clear chat">
            <span aria-hidden="true">×</span>
          </button>
        </header>

        <section id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            <div class="avatar">AX</div>
            <div class="bubble">
              <p>Set the repository, choose the model, then ask for a code change.</p>
            </div>
          </article>
        </section>

        <form id="chat-form" class="composer">
          <textarea id="instruction" rows="3" placeholder="Ask AgentNXT to change code in the selected repo..." required></textarea>
          <button id="send-button" type="submit">
            <span>Send</span>
          </button>
        </form>
      </main>

      <aside class="result-panel">
        <section>
          <h2>Changed Files</h2>
          <ul id="changed-files" class="file-list">
            <li>No changes yet</li>
          </ul>
        </section>

        <section>
          <h2>Run Output</h2>
          <pre id="run-output">No output yet.</pre>
        </section>
      </aside>
    </div>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
